
<div class="row">
    <div class="col-12 col-md-4 col-lg-3 mb-3">
        {{.TABLE_TRACK_TEKNISI}}
    </div>
    <div class="col-12 col-md-8 col-lg-9">
        <div class="card">
            <div class="card-header d-flex flex-row justify-content-between align-items-center">
                <h5 class="h-100 mb-0">Location History</h5>
                <button id="refreshButton" class="btn btn-primary p-2"><i class='bx bx-refresh bx-spin-hover' ></i></button>
            </div>
            <div class="card-body">
                <div class="col-12 ">
                    <!-- <label class="form-label">Date:</label> -->
                    <div class="mb-0">
                      <input
                        type="text"
                        class="form-control dt-date flatpickr-range-loc dt-input"
                        data-column="5"
                        placeholder="StartDate to EndDate"
                        data-column-index="4"
                        name="dt_date" />
                      <input
                        type="hidden"
                        class="form-control dt-date start_date_teknisi_loc dt-input"
                        data-column="5"
                        data-column-index="4"
                        name="value_from_start_date" />
                      <input
                        type="hidden"
                        class="form-control dt-date end_date_teknisi_loc dt-input"
                        name="value_from_end_date"
                        data-column="5"
                        data-column-index="4" />
                    </div>
                </div>
                <div class="leaflet-map" style="height: 80vh;" id="layerControl"></div>
            </div>
        </div>
    </div>
</div>

<script>
    var Teknisi_ID = 1;
    var startDateAEle = $('.start_date_teknisi_loc'),
          endDateAEle = $('.end_date_teknisi_loc');
    function openMap(lat, long) {
        const latDMS = convertToDMS(lat, true);
        const longDMS = convertToDMS(long, false);
        // const baseUrl = "https://example.com/maps"; // Replace with your desired URL
        const url = `https://www.google.com/maps/place/${latDMS}+${longDMS}/@${lat},${long},21z`;
    
        // Open the URL in a new tab
        window.open(url, '_blank');
    }
    function convertToDMS(decimal, isLatitude) {
        const degrees = Math.floor(Math.abs(decimal));
        const minutes = Math.floor((Math.abs(decimal) - degrees) * 60);
        const seconds = ((Math.abs(decimal) - degrees - minutes / 60) * 3600).toFixed(1);
        
        let direction;
        if (isLatitude) {
            direction = decimal >= 0 ? 'N' : 'S';
        } else {
            direction = decimal >= 0 ? 'E' : 'W';
        }

        // Format the DMS string
        return `${degrees}°${minutes}'${seconds}"${direction}`;
    }
    
    const layerControlVar = document.getElementById('layerControl');
    let layerControl;
    let markers = L.layerGroup();

    if (layerControlVar) {
        const street = L.tileLayer('https://{s}.tile.osm.org/{z}/{x}/{y}.png', {
            attribution: '<a href="https://www.openstreetmap.org/"></a>',
            maxZoom: 18
        });

        layerControl = L.map('layerControl', {
            layers: [street, markers]
        });

        // Enable caching of map tiles
        street.on('tileload', function(e) {
            e.tile.setAttribute('crossorigin', '');
        });

        // Function to fetch and update pin points
        function fetchAndUpdatePinPoints() {
            // Simulated API call (replace with actual API endpoint)
            fetch(webPath +'tab-track-teknisi/teknisi/maps?id='+Teknisi_ID+"&start="+startDateAEle.val()+"&end="+endDateAEle.val())
                .then(response => response.json())
                .then(data => {
                    updateMarkers(data);
                })
                .catch(error => console.error('Error fetching pin points:', error));
        }

        // Function to update markers on the map
        function updateMarkers(locations) {
            markers.clearLayers();
            const bounds = L.latLngBounds();

            locations.forEach(location => {
                const marker = L.marker([location.lat, location.long])
                    .bindPopup(`<a href="#" onclick="openMap(${location.lat},${location.long})">${location.no}:${location.name}</a> ${location.local_time}`);
                markers.addLayer(marker);
                bounds.extend([location.lat, location.long]);
            });

            layerControl.fitBounds(bounds);
        }

        // Initial fetch of pin points
        fetchAndUpdatePinPoints();

        // Add refresh button functionality
        document.getElementById('refreshButton').addEventListener('click', fetchAndUpdatePinPoints);

        // Add the tile layer to the map
        street.addTo(layerControl);
    }


  
          // Advanced Search Functions Starts
          // --------------------------------------------------------------------
  
          // Datepicker for advanced filter
          var rangePickrA = $('.flatpickr-range-loc'),
            dateFormatA = 'DD/MM/YYYY';
  
          if (rangePickrA.length) {
            rangePickrA.flatpickr({
              mode: 'range',
              dateFormat: 'd/m/Y',
              orientation: isRtl ? 'auto right' : 'auto left',
              locale: {
                format: dateFormatA
              },
              onClose: function (selectedDates, dateStr, instance) {
                var startDateA = '',
                  endDateA = new Date();
                if (selectedDates[0] != undefined) {
                  startDateA = moment(selectedDates[0]).format('DD/MM/YYYY');
                  startDateAEle.val(startDateA);
                }
                if (selectedDates[1] != undefined) {
                  endDateA = moment(selectedDates[1]).format('DD/MM/YYYY');
                  endDateAEle.val(endDateA);
                }
                $(rangePickrA).trigger('change').trigger('keyup');
                fetchAndUpdatePinPoints()
              }
            });
          }
</script>
