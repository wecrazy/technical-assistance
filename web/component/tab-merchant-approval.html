<div class="modal fade" id="addApproval" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-simple modal-edit-user">
    <div class="modal-content p-3 p-md-5">
      <div class="modal-body">
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        <div class="text-center mb-4">
          <h3>Approval Form</h3>
          <p>Updating new user role and set corporate.</p>
        </div>
        <form id="webUserApprovalForm" class="row g-3">
          <input type="hidden" id="user-admin-approval-id" value="" required>
          <div class="col-6">
            <label class="form-label" for="add-approval-role">Role</label>
            <select id="add-approval-role" name="add-approval-role" class="form-select" required>
              <option value="">Select</option>
            </select>
          </div>
          <div class="col-6">
            <label class="form-label" for="add-approval-corporate">Corporate</label>
            <select id="add-approval-corporate" name="add-approval-corporate" class="form-select" required>
              <option value="">Select</option>
            </select>
          </div>
          </div>
          <div class="col-12 text-center">
            <button type="submit" class="btn btn-primary me-sm-3 me-1 data-submit" onclick="webUserApproval()">Submit</button>
            <button type="reset" class="btn btn-label-secondary" data-bs-dismiss="modal" aria-label="Close">Cancel</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
