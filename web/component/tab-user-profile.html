
<!-- Header -->
<div class="row">
  <div class="col-12">
    <div class="card mb-4">
      <!-- <div class="user-profile-header-banner">
        <img src="../assets/img/pages/profile-banner.png" alt="Banner image" class="rounded-top" />
      </div> -->
      <div class="user-profile-header d-flex flex-column flex-sm-row text-sm-start text-center mb-4">
        <div class="flex-shrink-0 mt-n2 mx-sm-0 ms-0 ms-sm-4 mx-auto">
          <div class="profile-image-container" id="profile-img-container">
            <img id="profile-img"
                default="{{.profile_image}}"
                src="{{.profile_image}}"
                alt="user image"
                class="d-block rounded user-profile-img" />
          </div>
          <input type="file" id="file-input" accept="image/jpeg, image/png" style="display: none;" />
          <div class="buttons mx-2 mt-2 d-none flex-row justify-content-between">
            <button id="cancel-btn" class="btn btn-secondary">Cancel</button>
            <button id="save-btn" class="btn btn-primary">Save</button>
          </div>
        </div>
        <div class="flex-grow-1 mt-3 mt-sm-5">
          <div
            class="d-flex align-items-md-end align-items-sm-start align-items-center justify-content-md-between justify-content-start mx-4 flex-md-row flex-column gap-4">
            <div class="user-profile-info">
              <h4>{{.fullname}}</h4>
              <ul
                class="list-inline mb-0 d-flex align-items-center flex-wrap justify-content-sm-start justify-content-center gap-2">
                <li class="list-inline-item fw-medium"><i class="bx bx-pen"></i> {{.status_name}}</li>
                <li class="list-inline-item fw-medium"><i class="bx bx-map"></i> {{.ip}}</li>
                <li class="list-inline-item fw-medium">
                  <i class="bx bx-calendar-alt"></i> Joined {{.created_at_str}}
                </li>
              </ul>
            </div>
            <a href="javascript:void(0)" class="btn btn-primary text-nowrap">
              <i class="bx bx-user-check me-1"></i>Connected
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<!--/ Header -->
<!-- User Profile Content -->
<div class="row">
  <div class="col-xl-4 col-lg-5 col-md-5">
    <!-- About User -->
    <div class="card mb-4">
      <div class="card-body">
        <small class="text-muted text-uppercase">About</small>
        <ul class="list-unstyled mb-4 mt-3">
          <li class="d-flex align-items-center mb-3">
            <i class="bx bx-user"></i><span class="fw-medium mx-2">Full Name:</span> <span>{{.fullname}}</span>
          </li>
          <li class="d-flex align-items-center mb-3">
            <i class="bx bx-check"></i><span class="fw-medium mx-2">Status:</span> <span>{{.status_name}}</span>
          </li>
          <li class="d-flex align-items-center mb-3">
            <i class="bx bx-star"></i><span class="fw-medium mx-2">Role:</span> <span>{{.role_name}}</span>
          </li>
          <li class="d-flex align-items-center mb-3">
            <i class="bx bx-flag"></i><span class="fw-medium mx-2">Corporate:</span> <span>PG</span>
          </li>
        </ul>
        <small class="text-muted text-uppercase">Contacts</small>
        <ul class="list-unstyled mb-4 mt-3">
          <li class="d-flex align-items-center mb-3">
            <i class="bx bx-phone"></i><span class="fw-medium mx-2">Contact:</span>
            <span>{{.phone}}</span>
          </li>
          <li class="d-flex align-items-center mb-3">
            <i class="bx bx-envelope"></i><span class="fw-medium mx-2">Email:</span>
            <span>{{.email}}</span>
          </li>
        </ul>

      </div>
    </div>
    <!--/ About User -->

    <!--/ Profile Overview -->
  </div>
  <div class="col-xl-8 col-lg-7 col-md-7">
    <!-- Activity Timeline -->
    <div class="card card-action mb-4">
      <div class="card-datatable ">
        <table class="dt_user_activity_log table ">
          <thead>
            <tr>
              <th></th>
              <th>Date Time</th>
              <th>Action</th>
              <th>Full Name</th>
              <th>Status</th>
              <th>Detail Log</th>
            </tr>
          </thead>
        </table>
      </div>
    </div>
  </div>
</div>
