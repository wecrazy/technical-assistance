<!DOCTYPE html>

<html
  lang="en"
  class="light-style layout-wide customizer-hide"
  dir="ltr"
  data-theme="theme-default"
  data-assets-path="../assets/"
  data-template="vertical-menu-template">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />

    <title>Forgot Password - Pages</title>

    <meta name="description" content="" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="../assets/self/img/hommy_pay_logo.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap"
      rel="stylesheet" />

    <!-- Icons -->
    <link rel="stylesheet" href="../assets/vendor/fonts/boxicons.css" />
    <link rel="stylesheet" href="../assets/vendor/fonts/fontawesome.css" />
    <link rel="stylesheet" href="../assets/vendor/fonts/flag-icons.css" />

    <!-- Core CSS -->
    <link rel="stylesheet" href="../assets/vendor/css/rtl/core.css" class="template-customizer-core-css" />
    <link rel="stylesheet" href="../assets/vendor/css/rtl/theme-default.css" class="template-customizer-theme-css" />
    <link rel="stylesheet" href="../assets/css/demo.css" />

    <!-- Vendors CSS -->
    <link rel="stylesheet" href="../assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.css" />
    <link rel="stylesheet" href="../assets/vendor/libs/typeahead-js/typeahead.css" />
    <!-- Vendor -->
    <link rel="stylesheet" href="../assets/vendor/libs/@form-validation/umd/styles/index.min.css" />

    <!-- Page CSS -->
    <!-- Page -->
    <link rel="stylesheet" href="../assets/vendor/css/pages/page-auth.css" />

    <!-- Helpers -->
    <script src="../assets/vendor/js/helpers.js"></script>
    <!--! Template customizer & Theme config files MUST be included after core stylesheets and helpers.js in the <head> section -->
    <!--? Template customizer: To hide customizer set displayCustomizer value false in config.js.  -->
    <script src="../assets/vendor/js/template-customizer.js"></script>
    <!--? Config:  Mandatory theme config file contain global vars & default theme options, Set your preferred theme option in this file.  -->
    <script src="../assets/js/config.js"></script>
  </head>

  <body>
    <!-- Content -->

    <div class="container-xxl">
      <div class="authentication-wrapper authentication-basic container-p-y">
        <div class="authentication-inner py-4">
          <!-- Forgot Password -->
          <div class="card">
            <div class="card-body">
              <!-- Logo -->
              <div class="app-brand justify-content-center">
                <a href="/login" class="app-brand-link gap-2">
                  <span class="app-brand-logo demo">
                    <img src="{{.APP_LOGO}}" width="50px" alt="LOGO">
                  </span>
                  <span class="app-brand-text demo text-body fw-bold">{{.APP_NAME}}</span>
                </a>
              </div>
              <!-- /Logo -->
              <h4 class="mb-2">Forgot Password? 🔒</h4>
              <p class="mb-4">Enter your email and we'll send you instructions to reset your password</p>
              <form id="formAuthentication" class="mb-3" action="/forgot-password" method="POST">
                <div class="mb-3">
                  <label for="email" class="form-label">Email</label>
                  <input
                    type="text"
                    class="form-control"
                    id="email"
                    name="email"
                    placeholder="Enter your email"
                    autofocus />
                </div>
                <div class="mb-3">
                  <!-- Add a random query parameter to prevent caching -->
                  <img src="/captcha?_t=123" width="240" height="80" alt="CAPTCHA">
                  <!-- Add a refresh button -->
                  <a onclick="refreshCaptcha()" ><i style="font-size: 4em;" class='bx bx-rotate-right bx-spin-hover ' ></i></a>
                </div>
                <div class="mb-3">
                  <!-- <label for="text" class="form-label" data-i18n="Captcha">Captcha</label> -->
                  <input
                    type="text"
                    class="form-control glowing-border"
                    id="captcha"
                    name="captcha"
                    placeholder="Captcha"
                    autofocus />
                </div>
                <button class="btn btn-primary d-grid w-100" id="submit-reset-link" type="submit" disabled>Send Reset Link</button>
              </form>
              <div class="text-center">
                <a href="/login" class="d-flex align-items-center justify-content-center">
                  <i class="bx bx-chevron-left scaleX-n1-rtl bx-sm"></i>
                  Back to login
                </a>
              </div>
            </div>
          </div>
          <!-- /Forgot Password -->
        </div>
      </div>
    </div>

    <!-- / Content -->

    <!-- Core JS -->
    <!-- build:js assets/vendor/js/core.js -->

    <script src="../assets/vendor/libs/jquery/jquery.js"></script>
    <script src="../assets/vendor/libs/popper/popper.js"></script>
    <script src="../assets/vendor/js/bootstrap.js"></script>
    <script src="../assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.js"></script>
    <script src="../assets/vendor/libs/hammer/hammer.js"></script>
    <script src="../assets/vendor/libs/i18n/i18n.js"></script>
    <script src="../assets/vendor/libs/typeahead-js/typeahead.js"></script>
    <script src="../assets/vendor/js/menu.js"></script>

    <!-- endbuild -->

    <!-- Vendors JS -->
    <script src="../assets/vendor/libs/@form-validation/umd/bundle/popular.min.js"></script>
    <script src="../assets/vendor/libs/@form-validation/umd/plugin-bootstrap5/index.min.js"></script>
    <script src="../assets/vendor/libs/@form-validation/umd/plugin-auto-focus/index.min.js"></script>

    <!-- Main JS -->
    <script src="../assets/js/main.js"></script>

    <!-- Page JS -->
    <script src="../assets/js/pages-auth.js"></script>
    <script>
        // JavaScript function to validate email and captcha, enabling/disabling the submit button
        function validateForm() {
            const emailInput = document.getElementById("email").value;
            const captchaInput = document.getElementById("captcha").value;
            const submitButton = document.getElementById("submit-reset-link");

            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/; // Regex for email validation
            const captchaPattern = /^\d{6}$/; // Regex for 6-digit number validation

            const isEmailValid = emailPattern.test(emailInput);
            const isCaptchaValid = captchaPattern.test(captchaInput);

            // Enable the submit button only if both email and captcha are valid
            submitButton.disabled = !(isEmailValid && isCaptchaValid);
        }

        // Initialize event listeners for input fields
        document.addEventListener("DOMContentLoaded", function() {
            const emailInput = document.getElementById("email");
            const captchaInput = document.getElementById("captcha");

            // Initially disable the submit button
            document.getElementById("submit-reset-link").disabled = true;

            // Validate form whenever email or captcha input changes
            emailInput.addEventListener("keyup", validateForm);
            captchaInput.addEventListener("keyup", validateForm);
        });
        function refreshCaptcha() {
            // Generate a random number to append as a query parameter
            var random = Math.floor(Math.random() * 1000);
            // Get the CAPTCHA image element
            var captchaImage = document.querySelector('img[alt="CAPTCHA"]');
            // Update the image source with the new random query parameter
            captchaImage.src = "/captcha?_t=" + random;
            document.getElementById("captcha").value = "";
            timeEvents = [];
            captchaEvents = [];
        }
  </script>
  </body>
</html>
