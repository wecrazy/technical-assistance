    <style>
      /* Define the glowing-border class */
      .glowing-border {
          border: 2px solid transparent; /* Initial transparent border */
          border-radius: 3px; /* Add some border radius for a rounded appearance */
          transition: border-color 0.5s ease; /* Smooth transition for border color change */
      }

      /* Define the glow animation */
      @keyframes glow {
          0% {
              border-color: transparent; /* Initial border color */
              box-shadow: none; /* Initial box-shadow */
          }
          50% {
              border-color: paleturquoise; /* Midpoint border color */
              box-shadow: 0 0 10px paleturquoise; /* Midpoint box-shadow */
          }
          100% {
              border-color: transparent; /* Final border color */
              box-shadow: none; /* Final box-shadow */
          }
      }

      /* Apply the glow animation to elements with the glowing-border class that are not hovered or focused */
      .glowing-border:not(:hover):not(:focus) {
          animation: glow 2.5s infinite alternate; /* Apply the glow animation */
      }
      .glow-border{
        border: 2px solid transparent; /* Initial transparent border */
        border-radius: 3px; /* Add some border radius for a rounded appearance */
        border-color: skyblue; /* Midpoint border color */
        box-shadow: 0 0 10px skyblue; /* Midpoint box-shadow */
      }
    </style>

  <body>
    <!-- Content -->

    <div class="container-xxl">
      <div class="authentication-wrapper authentication-basic container-p-y">
        <div class="authentication-inner">
          <!-- Register -->
          <div class="card">
            <div class="card-body">
              <!-- Logo -->
              <div class="app-brand justify-content-center">
                <a href="#" class="app-brand-link gap-2 d-flex align-items-center">

              </div>
              <p class="mb-4" data-i18n="Please sign-in to your account">Please sign-in to your account</p>

              <form id="formLoginAuthentication" class="mb-3">
                <div class="mb-3">
                  <label for="email" class="form-label" data-i18n="Email">Email</label>
                  <input
                    type="text"
                    class="form-control glowing-border"
                    id="email"
                    name="email-username"
                    placeholder="desta@gmail.com"
                    autofocus />
                    <h5 class="text-danger" id="delay_timer"></h5>
                </div>
                <div class="mb-3 form-password-toggle">
                  <div class="d-flex justify-content-between">
                    <label class="form-label" for="password" data-i18n="Password">Password</label>
                    <!-- <h6 class="text-primary" >
                      <small>Forgot Password?</small>
                    </h6> -->
                  </div>
                  <div id="password-container" class="input-group input-group-merge glowing-border">
                    <input
                      type="password"
                      id="password"
                      class="form-control"
                      name="password"
                      placeholder="&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;"
                      aria-describedby="password" />
                    <span class="input-group-text cursor-pointer"><i class="bx bx-hide"></i></span>
                  </div>
                </div>
                <!-- <div class="mb-3">
                  <img src="{{.GLOBAL_URL}}captcha?_t=123" width="240" height="80" alt="CAPTCHA">
                  <a onclick="refreshCaptcha()" ><i style="font-size: 4em;" class='bx bx-rotate-right bx-spin-hover ' ></i></a>

                <div class="mb-3 d-flex" id="submitContainer">
                  <button class="btn btn-primary d-grid w-100" id="signInBtn" type="submit" data-i18n="Sign in" disabled>Sign in</button>

    <script>
      function refreshCaptcha() {
          // Generate a random number to append as a query parameter
          var random = Math.floor(Math.random() * 1000);
          // Get the CAPTCHA image element
          var captchaImage = document.querySelector('img[alt="CAPTCHA"]');
          // Update the image source with the new random query parameter
          captchaImage.src = "{{.GLOBAL_URL}}captcha?_t=" + random;
          document.getElementById("captcha").value = "";
          timeEvents = [];
          captchaEvents = [];
      }

      // Get the container element
      var container = document.getElementById("submitContainer");

      // Add mousemove event listener to the container
      container.addEventListener("mousemove", function(event) {
        var signInBtn = document.getElementById("signInBtn");
          // Get the width of the container
          var containerWidth = container.offsetWidth;

          // Get the x-coordinate of the mouse relative to the container
          var mouseX = event.offsetX;

          // Calculate the position of the mouse relative to the center of the container
          var positionFromCenter = mouseX - (containerWidth / 2);

          // Determine if the mouse is on the left or right side of the container
          var email = $('#email').val();
          var password = $('#password').val();
          var captcha = $('#captcha').val();

          // Enable or disable sign-in button based on conditions
          if (email.trim() == '' || password.trim() == '' || captcha.trim() == '') {
            if (positionFromCenter < 0) {
                signInBtn.classList.remove("w-100");
                container.classList.remove('flex-row')
                container.classList.add('flex-row-reverse')
            } else {
                signInBtn.classList.remove("w-100");
                container.classList.add('flex-row')
                container.classList.remove('flex-row-reverse')
            }

          }
      });
      setInterval(function() {
        captcha.val("");
        timeEvents = [];
        captchaEvents = [];
        refreshCaptcha(); // Implement this function to refresh the captcha
      }, 10 * 60 * 1000); // 10 minutes
     </script>
