<!DOCTYPE html>

<html
  lang="en"
  class="light-style layout-wide customizer-hide"
  dir="ltr"
  data-theme="theme-default"
  data-assets-path="/assets/"
  data-template="vertical-menu-template">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />

    <title>Reset Password {{.APP_NAME}} </title>

    <meta name="description" content="" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="{{.APP_LOGO}}" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap"
      rel="stylesheet" />

    <!-- Icons -->
    <link rel="stylesheet" href="/assets/vendor/fonts/boxicons.css" />
    <link rel="stylesheet" href="/assets/vendor/fonts/fontawesome.css" />
    <link rel="stylesheet" href="/assets/vendor/fonts/flag-icons.css" />

    <!-- Core CSS -->
    <link rel="stylesheet" href="/assets/vendor/css/rtl/core.css" class="template-customizer-core-css" />
    <link rel="stylesheet" href="/assets/vendor/css/rtl/theme-default.css" class="template-customizer-theme-css" />
    <link rel="stylesheet" href="/assets/css/demo.css" />

    <!-- Vendors CSS -->
    <link rel="stylesheet" href="/assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.css" />
    <link rel="stylesheet" href="/assets/vendor/libs/typeahead-js/typeahead.css" />
    <link rel="stylesheet" href="/assets/vendor/libs/sweetalert2/sweetalert2.css" />
    <!-- Vendor -->
    <link rel="stylesheet" href="/assets/vendor/libs/@form-validation/umd/styles/index.min.css" />

    <!-- Page CSS -->
    <!-- Page -->
    <link rel="stylesheet" href="/assets/vendor/css/pages/page-auth.css" />

    <!-- Helpers -->
    <script src="/assets/vendor/js/helpers.js"></script>
    <!--! Template customizer & Theme config files MUST be included after core stylesheets and helpers.js in the <head> section -->
    <!--? Template customizer: To hide customizer set displayCustomizer value false in config.js.  -->
    <script src="/assets/vendor/js/template-customizer.js"></script>
    <!--? Config:  Mandatory theme config file contain global vars & default theme options, Set your preferred theme option in this file.  -->
    <script src="/assets/js/config.js"></script>
  </head>

  <body>
    <!-- Content -->

    <div class="container-xxl">
      <div class="authentication-wrapper authentication-basic container-p-y">
        <div class="authentication-inner py-4">
          <!-- Reset Password -->
          <div class="card">
            <div class="card-body">
              <!-- Logo -->
              <div class="app-brand justify-content-center">
                <a href="/login" class="app-brand-link gap-2">
                  <span class="app-brand-logo demo">
                    <img src="{{.APP_LOGO}}"  width="50px" alt="LOGO">
                  </span>
                  <span class="app-brand-text demo text-body fw-bold">{{.APP_NAME}}</span>
                </a>
              </div>
              <!-- /Logo -->
              <h4 class="mb-2">Reset Password 🔒</h4>
              <p class="mb-4">for <span class="fw-medium">{{.EMAIL}}</span></p>
              <div id="formAuthentication" class="mb-3" >
                <input type="hidden" id="email" name="email" value="{{.EMAIL}}">
                <input type="hidden" id="token_data" name="token_data" value="{{.TOKEN}}">
                <div class="mb-3 form-password-toggle">
                  <label class="form-label" for="password">New Password</label>
                  <div class="input-group input-group-merge">
                    <input
                      type="password"
                      id="password"
                      class="form-control"
                      name="password"
                      placeholder="&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;"
                      aria-describedby="password" 
                      required/>
                    <span class="input-group-text cursor-pointer"><i class="bx bx-hide"></i></span>
                  </div>
                </div>
                <div class="mb-3 form-password-toggle">
                  <label class="form-label" for="confirm-password">Confirm Password</label>
                  <div class="input-group input-group-merge">
                    <input
                      type="password"
                      id="confirm-password"
                      class="form-control"
                      name="confirm-password"
                      placeholder="&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;"
                      aria-describedby="password" 
                      required/>
                      <span class="input-group-text cursor-pointer"><i class="bx bx-hide"></i></span>
                    <p style="font-size: 12px;" class="p-1">Harus mengandung Huruf Kapital, Huruf Kecil, Angka, Karakter (~!@#$%^&*()_+`{}|:"<>?), Minimal 12 Karakter</p>
                  </div>
                </div>
                <button class="btn btn-primary d-grid w-100 mb-3" id="submit-button" onclick="sendData()">Set new password</button>
                <div class="text-center">
                  <a href="/login">
                    <i class="bx bx-chevron-left scaleX-n1-rtl bx-sm"></i>
                    Back to login
                  </a>
                </div>
              </div>
            </div>
          </div>
          <!-- /Reset Password -->
        </div>
      </div>
    </div>

    <!-- / Content -->

    <!-- Core JS -->
    <!-- build:js assets/vendor/js/core.js -->

    <script src="/assets/vendor/libs/jquery/jquery.js"></script>
    <script src="/assets/vendor/libs/popper/popper.js"></script>
    <script src="/assets/vendor/js/bootstrap.js"></script>
    <script src="/assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.js"></script>
    <script src="/assets/vendor/libs/hammer/hammer.js"></script>
    <script src="/assets/vendor/libs/i18n/i18n.js"></script>
    <script src="/assets/vendor/libs/typeahead-js/typeahead.js"></script>
    <script src="/assets/vendor/js/menu.js"></script>

    <!-- endbuild -->

    <!-- Vendors JS -->
    <script src="/assets/vendor/libs/sweetalert2/sweetalert2.js"></script>
    <script src="/assets/vendor/libs/@form-validation/umd/bundle/popular.min.js"></script>
    <script src="/assets/vendor/libs/@form-validation/umd/plugin-bootstrap5/index.min.js"></script>
    <script src="/assets/vendor/libs/@form-validation/umd/plugin-auto-focus/index.min.js"></script>

    <!-- Main JS -->
    <script src="/assets/js/main.js"></script>
    <script src="/assets/self/function.js?_=1"></script>


    <!-- Page JS -->
    <script src="/assets/js/pages-auth.js?_=2"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function() {
          document.getElementById("submit-button").disabled = true;

          // Listen for keyup event on the email input field
          const password = document.getElementById("password");
          password.addEventListener("keyup", function() {
              validatePassword();
          });
          const passwordConfirm = document.getElementById("confirm-password");
          passwordConfirm.addEventListener("keyup", function() {
              validatePassword();
          });
          function validatePassword() {
            if (password.value == passwordConfirm.value) {
                document.getElementById("submit-button").disabled = false;
            } else {
                document.getElementById("submit-button").disabled = true;
            }
        }
      });
      function sendData(){
        var email = document.getElementById("email").value
        var token_data = document.getElementById("token_data").value
        var password= document.getElementById("password").value
        var confirmPwd = document.getElementById("confirm-password").value
        if (password != confirmPwd){
          Swal.fire({
                icon: "error",
                title: "Error",
                text: "Password Not Match"
          });
          return
        }
        const formData = new FormData();
        // Append data to the FormData object
        formData.append("email", email);
        formData.append("token_data", token_data);
        formData.append("password", password);
        formData.append("confirm-password", confirmPwd);
        // Send POST request to server
        fetch(window.location.href, {
            method: "POST",
            body: formData
        })
        .then(response => {
            if (!response.ok) {
                // Parse and throw the error message from the response
                return response.json().then(errorJson => {
                    throw new Error(errorJson.error || "An unknown error occurred");
                });
            }
            return response.json();
        })
        .then(data => {
            // Handle successful response
            Swal.fire({
                icon: "success",
                title: "Success",
                text: data.msg
            });
            setTimeout(function() {
                window.location.href = "/login";
            }, 2000);
        })
        .catch(error => {
            console.error(error);
            // Handle error
            Swal.fire({
                icon: "error",
                title: "Error",
                text: error.message
            });
        });
      }
    </script>
  </body>
</html>
