<!-- Advanced Search -->
<div class="card">
    <h5 class="card-header">{{ .title }}</h5>
    <div class="card-datatable table-responsive">
      <table class="{{.table_name}} table border-top">
        <thead>
          <tr>
            {{range .table_columns}}
                <th>{{.Header}}</th>
            {{end}}
          </tr>
        </thead>
        <tfoot>
          <tr>
            {{range .table_columns}}
                <th>{{.Header}}</th>
            {{end}}
          </tr>
        </tfoot>
      </table>
    </div>
</div>
<!--/ Advanced Search -->
<script>
    
'use strict';

$(function () {
  function initDataTableCurrent(isScrollable){
    var dt_current = $('.{{.table_name}}');
    if (dt_current.length) {
      var dt_adv_filter = dt_current.DataTable({
        dom: `<"row"<"col-sm-12 col-md-6"l><"col-sm-12 col-md-6 d-flex justify-content-center justify-content-md-end flex-wrap mb-1"fB><"dt_adv_search_{{.table_name}}">>t<"row"<"col-sm-12 col-md-6"i><"col-sm-12 col-md-6"p>>`,
        ajax: '{{.endpoint}}',
        columns: [
        //{{- range .table_columns }}
              { data: '{{ .Data }}' },
        //{{- end }}
        ],
        scrollY: isScrollable ? '500px' : '',
        columnDefs: [
          {
            className: 'control',
            orderable: false,
            targets: 0,
            render: function (data, type, full, meta) {
              return '';
            }
          }
        ],
        orderCellsTop: true,
        responsive: {
          details: {
            display: $.fn.dataTable.Responsive.display.modal({
              header: function (row) {
                var data = row.data();
                return 'Details of ' + data['full_name'];
              }
            }),
            type: 'column',
            renderer: function (api, rowIdx, columns) {
              var data = $.map(columns, function (col, i) {
                return col.title !== '' // ? Do not show row in modal popup if title is blank (for check box)
                  ? '<tr data-dt-row="' +
                      col.rowIndex +
                      '" data-dt-column="' +
                      col.columnIndex +
                      '">' +
                      '<td>' +
                      col.title +
                      ':' +
                      '</td> ' +
                      '<td>' +
                      col.data +
                      '</td>' +
                      '</tr>'
                  : '';
              }).join('');
  
              return data ? $('<table class="table"/><tbody />').append(data) : false;
            }
          }
        },
        language: {
          sLengthMenu: '_MENU_',
          search: '',
          searchPlaceholder: 'Search'
        },
        buttons: [
          {
            text: `<i class='bx bx-filter-alt' ></i> `,
            className: 'btn btn-label-info mx-1 p-2',
            attr: {
                'data-bs-toggle': 'collapse',
                'href': '#collapseExample',
                'role': 'button',
                'aria-expanded': 'false',
                'aria-controls': 'collapseExample'
            }
          },
          {
            extend: 'collection',
            className: 'btn btn-label-primary dropdown-toggle',
            text: '<i class="bx bx-export me-sm-1"></i> <span class="d-none d-sm-inline-block">Export</span>',
            buttons: [
              {
                extend: 'print',
                text: '<i class="bx bx-printer me-1" ></i>Print',
                className: 'dropdown-item',
                exportOptions: {
                  columns: [3, 4, 5, 6, 7],
                  // prevent avatar to be display
                  format: {
                    body: function (inner, coldex, rowdex) {
                      if (inner.length <= 0) return inner;
                      var el = $.parseHTML(inner);
                      var result = '';
                      $.each(el, function (index, item) {
                        if (item.classList !== undefined && item.classList.contains('user-name')) {
                          result = result + item.lastChild.firstChild.textContent;
                        } else if (item.innerText === undefined) {
                          result = result + item.textContent;
                        } else result = result + item.innerText;
                      });
                      return result;
                    }
                  }
                },
                customize: function (win) {
                  //customize print view for dark
                  $(win.document.body)
                    .css('color', config.colors.headingColor)
                    .css('border-color', config.colors.borderColor)
                    .css('background-color', config.colors.bodyBg);
                  $(win.document.body)
                    .find('table')
                    .addClass('compact')
                    .css('color', 'inherit')
                    .css('border-color', 'inherit')
                    .css('background-color', 'inherit');
                }
              },
              {
                extend: 'csv',
                text: '<i class="bx bx-file me-1" ></i>Csv',
                className: 'dropdown-item',
                exportOptions: {
                  columns: [3, 4, 5, 6, 7],
                  // prevent avatar to be display
                  format: {
                    body: function (inner, coldex, rowdex) {
                      if (inner.length <= 0) return inner;
                      var el = $.parseHTML(inner);
                      var result = '';
                      $.each(el, function (index, item) {
                        if (item.classList !== undefined && item.classList.contains('user-name')) {
                          result = result + item.lastChild.firstChild.textContent;
                        } else if (item.innerText === undefined) {
                          result = result + item.textContent;
                        } else result = result + item.innerText;
                      });
                      return result;
                    }
                  }
                }
              },
              {
                extend: 'excel',
                text: '<i class="bx bxs-file-export me-1"></i>Excel',
                className: 'dropdown-item',
                exportOptions: {
                  columns: [3, 4, 5, 6, 7],
                  // prevent avatar to be display
                  format: {
                    body: function (inner, coldex, rowdex) {
                      if (inner.length <= 0) return inner;
                      var el = $.parseHTML(inner);
                      var result = '';
                      $.each(el, function (index, item) {
                        if (item.classList !== undefined && item.classList.contains('user-name')) {
                          result = result + item.lastChild.firstChild.textContent;
                        } else if (item.innerText === undefined) {
                          result = result + item.textContent;
                        } else result = result + item.innerText;
                      });
                      return result;
                    }
                  }
                }
              },
              {
                extend: 'pdf',
                text: '<i class="bx bxs-file-pdf me-1"></i>Pdf',
                className: 'dropdown-item',
                exportOptions: {
                  columns: [3, 4, 5, 6, 7],
                  // prevent avatar to be display
                  format: {
                    body: function (inner, coldex, rowdex) {
                      if (inner.length <= 0) return inner;
                      var el = $.parseHTML(inner);
                      var result = '';
                      $.each(el, function (index, item) {
                        if (item.classList !== undefined && item.classList.contains('user-name')) {
                          result = result + item.lastChild.firstChild.textContent;
                        } else if (item.innerText === undefined) {
                          result = result + item.textContent;
                        } else result = result + item.innerText;
                      });
                      return result;
                    }
                  }
                }
              },
              {
                extend: 'copy',
                text: '<i class="bx bx-copy me-1" ></i>Copy',
                className: 'dropdown-item',
                exportOptions: {
                  columns: [3, 4, 5, 6, 7],
                  // prevent avatar to be display
                  format: {
                    body: function (inner, coldex, rowdex) {
                      if (inner.length <= 0) return inner;
                      var el = $.parseHTML(inner);
                      var result = '';
                      $.each(el, function (index, item) {
                        if (item.classList !== undefined && item.classList.contains('user-name')) {
                          result = result + item.lastChild.firstChild.textContent;
                        } else if (item.innerText === undefined) {
                          result = result + item.textContent;
                        } else result = result + item.innerText;
                      });
                      return result;
                    }
                  }
                }
              }
            ]
          },
          {
            text: isScrollable?`<i class='bx bx-expand-vertical'></i>`:`<i class='bx bx-collapse-vertical' ></i>`,
            className: 'btn btn-label-dark mx-1 p-2',
            action: function (e, dt, node, config) {
                // Toggle the scrollEnabled variable
                isScrollable = !isScrollable;
  
                // Destroy the current DataTable instance
                dt.destroy();
  
                // Reinitialize the DataTable with the new scrollY setting
                initDataTableCurrent(isScrollable);
            }
          },
        ],
        initComplete: function() {
          // Add your class here after DataTable is fully initialized
          $('.dt-buttons').addClass('my-3');
          $('.dataTables_filter').addClass('my-3');
          $('.dt_adv_search_{{.table_name}}').html(
            `<div class="collapse mb-2" id="collapseExample">
              <div class="row">
                <div class="col-12">
                  <div class="row g-3">
                    {{range .table_columns}}
                      {{if .IsShowing}}
                      <div class="col-12 col-sm-6 col-lg-4">{{.Filter}}</div>
                      {{end}}
                    {{end}}
                    
                  </div>
                </div>
              </div>
            </div>
          `);
          var startDateEle = $('.start_date_{{.table_name}}'),
          endDateEle = $('.end_date_{{.table_name}}');
  
          // Advanced Search Functions Starts
          // --------------------------------------------------------------------
  
          // Datepicker for advanced filter
          var rangePickr = $('.flatpickr-range'),
            dateFormat = 'DD/MM/YYYY';
  
          if (rangePickr.length) {
            rangePickr.flatpickr({
              mode: 'range',
              dateFormat: 'd/m/Y',
              orientation: isRtl ? 'auto right' : 'auto left',
              locale: {
                format: dateFormat
              },
              onClose: function (selectedDates, dateStr, instance) {
                var startDate = '',
                  endDate = new Date();
                if (selectedDates[0] != undefined) {
                  startDate = moment(selectedDates[0]).format('DD/MM/YYYY');
                  startDateEle.val(startDate);
                }
                if (selectedDates[1] != undefined) {
                  endDate = moment(selectedDates[1]).format('DD/MM/YYYY');
                  endDateEle.val(endDate);
                }
                $(rangePickr).trigger('change').trigger('keyup');
              }
            });
          }
  
          // Filter column wise function
          function filterColumn(i, val) {
            if (i == 5) {
              var startDate = startDateEle.val(),
                endDate = endDateEle.val();
              if (startDate !== '' && endDate !== '') {
                $.fn.dataTableExt.afnFiltering.length = 0; // Reset datatable filter
                dt_current.dataTable().fnDraw(); // Draw table after filter
                filterByDate(i, startDate, endDate); // We call our filter function
              }
              dt_current.dataTable().fnDraw();
            } else {
              dt_current.DataTable().column(i).search(val, false, true).draw();
            }
          }
  
          // Advance filter function
          // We pass the column location, the start date, and the end date
          $.fn.dataTableExt.afnFiltering.length = 0;
          var filterByDate = function (column, startDate, endDate) {
            // Custom filter syntax requires pushing the new filter to the global filter array
            $.fn.dataTableExt.afnFiltering.push(function (oSettings, aData, iDataIndex) {
              var rowDate = normalizeDate(aData[column]),
                start = normalizeDate(startDate),
                end = normalizeDate(endDate);
  
              // If our date from the row is between the start and end
              if (start <= rowDate && rowDate <= end) {
                return true;
              } else if (rowDate >= start && end === '' && start !== '') {
                return true;
              } else if (rowDate <= end && start === '' && end !== '') {
                return true;
              } else {
                return false;
              }
            });
          };
  
          // converts date strings to a Date object, then normalized into a YYYYMMMDD format (ex: 20131220). Makes comparing dates easier. ex: 20131220 > 20121220
          var normalizeDate = function (dateString) {
            var date = new Date(dateString);
            var normalized =
              date.getFullYear() + '' + ('0' + (date.getMonth() + 1)).slice(-2) + '' + ('0' + date.getDate()).slice(-2);
            return normalized;
          };
          // Advanced Search Functions Ends
  
          
          // on key up from input field
          $('input.dt-input').on('keyup', function () {
            filterColumn($(this).attr('data-column'), $(this).val());
          });
  
          // Filter form control to default size
          // ? setTimeout used for multilingual table initialization
          setTimeout(() => {
            $('.dataTables_filter .form-control').removeClass('form-control-sm');
            $('.dataTables_length .form-select').removeClass('form-select-sm');
          }, 200);
        }
      });
    }
  }
  initDataTableCurrent(false)
});
</script>
